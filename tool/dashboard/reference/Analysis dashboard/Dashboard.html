<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Refactoring Trajectory — Analysis</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* IntelliJ IDEA dark — inverted: lighter shell, darker surfaces */
    --bg: #2b2d30;          /* page / shell background (lighter) */
    --bg-1: #1e1f22;        /* panels, cards, header (darker) */
    --bg-2: #1e1f22;        /* same — surface */
    --bg-3: #18191c;        /* deepest — selection / input wells */
    --border: #393b40;      /* visible since shell is lighter */
    --border-strong: #4a4d54;
    --fg: #dfe1e5;
    --fg-2: #bcbec4;
    --fg-3: #868a91;
    --fg-4: #6f737a;
    --accent: #7ee8d4;       /* IntelliJ cyan/teal */
    --accent-2: #548af7;     /* IntelliJ blue */
    --accent-3: #c27bff;     /* IntelliJ purple */
    --good: #5fb865;         /* IJ inspection green */
    --bad:  #e55765;         /* IJ inspection red */
    --warn: #e8a33d;         /* IJ warning amber */
    --unknown: #6f737a;
    --radius: 6px;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'Inter', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  #root { height: 100vh; width: 100vw; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #2a3140; border-radius: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/graph.jsx"></script>
<script type="text/babel" src="src/panels.jsx"></script>
<script type="text/babel" src="src/tweaks.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
