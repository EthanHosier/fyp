# Minimal log4j 1.x config to silence the startup warning emitted by
# transitive consumers of log4j 1.x (CK, Apache HTTP client, etc.) when
# no appender is configured on the classpath.
#
# Root logger is pinned to WARN with a console appender so genuine
# warnings still surface, but neither CK nor the HTTP client are chatty
# at WARN level — output remains quiet during normal runs.
log4j.rootLogger=WARN, console

log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.target=System.err
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%-5p [%t] %c - %m%n
